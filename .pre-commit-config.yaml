exclude: 'node_modules|.git'
default_stages: [pre-commit]
fail_fast: false


repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
        files: "frappe_editor.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.0
    hooks:
      - id: ruff
        name: "Run ruff linter and apply fixes"
        args: ["--fix"]

      - id: ruff-format
        name: "Format Python code"

  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.45.0
    hooks:
      - id: oxfmt
        files: "frappe_editor.*"
        types_or: [javascript, vue, scss]
        exclude: |
          (?x)^(
              frappe_editor/public/dist/.*|
              .*node_modules.*|
              .*boilerplate.*|
              frappe_editor/templates/includes/.*|
              frappe_editor/public/js/lib/.*
          )$

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.60.0
    hooks:
      - id: oxlint
        args: ["--quiet"]
        exclude: |
          (?x)^(
              frappe_editor/public/dist/.*|
              cypress/.*|
              .*node_modules.*|
              .*boilerplate.*|
              frappe_editor/templates/includes/.*|
              frappe_editor/public/js/lib/.*
          )$

ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: false
